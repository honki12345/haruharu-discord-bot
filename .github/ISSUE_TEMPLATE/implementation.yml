name: Implementation
description: 기능 구현, 리팩토링, 버그 수정 이슈
title: '[type] '
labels:
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        구현 이슈는 완료조건과 회귀 테스트 계획까지 포함한 작업 계약이어야 한다.
        구현을 시작하기 전에 아래 항목을 모두 채워라.

  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 왜 이 작업이 필요한지 적는다.
      placeholder: |
        - 현재 문제
        - 기대 효과
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: 범위
      description: 이번 이슈에서 포함할 작업과 제외할 작업을 적는다.
      placeholder: |
        포함:
        - ...

        제외:
        - ...
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: 완료조건
      description: 관찰 가능한 결과 기준으로 적는다. 구현 완료 판정에 직접 사용된다.
      placeholder: |
        - [ ] ...
        - [ ] ...
    validations:
      required: true

  - type: textarea
    id: verification
    attributes:
      label: 검증항목
      description: 로컬에서 실제로 실행하거나 확인할 명령/절차를 적는다.
      placeholder: |
        - [ ] npm run lint
        - [ ] npx prettier --check src
        - [ ] npm test
    validations:
      required: true

  - type: textarea
    id: regression_tests
    attributes:
      label: 회귀 테스트 계획
      description: 먼저 실패하는 테스트를 만들 수 있으면 그 시나리오를 적고, 어렵다면 이유와 대체 검증을 적는다.
      placeholder: |
        - [ ] 구현 전에 failing test를 추가한다
        - [ ] failing test가 어떤 조건에서 실패해야 하는지 적는다
        - [ ] 구현 후 어떤 테스트가 green 이어야 하는지 적는다
        - failing test가 어렵다면 그 이유와 대체 검증 절차를 적는다
    validations:
      required: true

  - type: textarea
    id: implementation_plan
    attributes:
      label: 구현 계획
      description: 상위 계층(구조/흐름)과 하위 계층(파일/모듈/테스트)으로 나눠 적는다.
      placeholder: |
        상위 계층:
        - ...

        하위 계층:
        - ...
    validations:
      required: true
