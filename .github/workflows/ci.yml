name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # 수동 실행

jobs:
  lint-and-format:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check src

  test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  bot-smoke-test:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run bot boot smoke test
        run: npm run test:smoke

  integration-test:
    runs-on: ubuntu-22.04
    needs: [lint-and-format, test, bot-smoke-test]
    concurrency:
      group: integration-test-${{ vars.TEST_GUILD_ID || 'default-guild' }}
      cancel-in-progress: false
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Prepare integration config.json
        run: node scripts/write-integration-config.mjs
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TEST_CHANNEL_ID: ${{ vars.TEST_CHANNEL_ID }}
          TEST_GUILD_ID: ${{ vars.TEST_GUILD_ID }}
          START_HERE_CHANNEL_ID: ${{ vars.START_HERE_CHANNEL_ID }}

      - name: Sync slash commands
        run: npm run deploy:commands

      - name: Run integration tests
        run: npm run test:integration
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          TEST_CHANNEL_ID: ${{ vars.TEST_CHANNEL_ID }}
          TEST_GUILD_ID: ${{ vars.TEST_GUILD_ID }}
