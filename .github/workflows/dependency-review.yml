name: Dependency Review

on:
  pull_request:
    branches: [main]
    paths:
      - package.json
      - package-lock.json
      - .github/dependency-review-config.yml

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          config-file: ./.github/dependency-review-config.yml
